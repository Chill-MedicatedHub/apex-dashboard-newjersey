function Dashboard({

  setFilters

  const rows = data.rows || [];

  // Helper: detect sample/promo rows
  // Apex has an explicit "is_sample" field, but we also catch SAMP/SAMPLE in names as a safety net
  const isSampleRow = r => {
    if (String(r.is_sample || '').toLowerCase() === 'yes') return true;
    const name = String(r.product_name || '').toUpperCase();
    if (name.includes('SAMP') || name.includes('SAMPLE')) return true;
    const unit = parseMoney(r.product_listing_price);
    if (unit > 0 && unit < 0.5) return true;
    return false;
